<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Studi · Daily Study Tracker</title>
<meta name="description" content="A playful daily study tracker — subjects, pomodoro, schedule, journal, mock tests. Saves to your browser. 100% free, no signup." />
<meta name="theme-color" content="#FFD600" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Studi" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23FFD600' stroke='%231a1a2e' stroke-width='4'/><text x='32' y='44' text-anchor='middle' font-size='38' font-family='sans-serif' font-weight='800' fill='%231a1a2e'>S</text></svg>" />
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%23FFD600'/><rect x='40' y='40' width='432' height='432' rx='80' fill='%23FFD600' stroke='%231a1a2e' stroke-width='20'/><text x='256' y='360' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='320' font-weight='900' fill='%231a1a2e'>S</text></svg>" />

<!-- Tailwind via Play CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- html2canvas for share PNG -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet" />

<style>
  :root{
    --cream:#FFF7E3; --cream-2:#FFEFC2; --paper:#FFFFFF;
    --ink:#1a1a2e; --ink-soft:#4b4b63; --muted:#8e8ea3;
    --yellow:#FFD600; --mint:#00C896; --coral:#FF6B6B;
    --sky:#5BC0EB; --lavender:#B388FF; --peach:#FFB38A;
    --shadow:4px 4px 0 var(--ink); --shadow-sm:3px 3px 0 var(--ink);
  }
  *{box-sizing:border-box}
  html,body{background:var(--cream); color:var(--ink); font-family:'DM Sans',sans-serif;}
  body{
    background-image:
      radial-gradient(rgba(26,26,46,0.08) 1.2px, transparent 1.2px),
      radial-gradient(ellipse at top right, rgba(255,107,107,0.18), transparent 55%),
      radial-gradient(ellipse at bottom left, rgba(91,192,235,0.18), transparent 55%);
    background-size: 22px 22px, 100% 100%, 100% 100%;
    background-attachment: fixed;
    margin:0; min-height:100vh;
  }
  .h-display{font-family:'Bricolage Grotesque',sans-serif; letter-spacing:-0.02em;}
  .mono{font-family:'JetBrains Mono',monospace}
  .nb-card{background:var(--paper); border:2px solid var(--ink); border-radius:18px; box-shadow:var(--shadow);}
  .nb-card-soft{background:var(--paper); border:2px solid var(--ink); border-radius:18px;}
  .nb-btn{border:2px solid var(--ink); border-radius:999px; box-shadow:var(--shadow-sm);
    transition:transform .15s, box-shadow .15s; font-weight:700; cursor:pointer; background:#fff;}
  .nb-btn:hover{transform:translate(-2px,-2px); box-shadow:5px 5px 0 var(--ink);}
  .nb-btn:active{transform:translate(1px,1px); box-shadow:1px 1px 0 var(--ink);}
  .nb-btn:disabled{opacity:.5; cursor:not-allowed; transform:none; box-shadow:var(--shadow-sm);}
  .nb-input{background:#fffdf3; border:2px solid var(--ink); border-radius:14px; color:var(--ink); padding:10px 12px; outline:none; width:100%;}
  .nb-input:focus{box-shadow:var(--shadow-sm); background:#fff;}
  .sticker{display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border:2px solid var(--ink);
    border-radius:999px; font-weight:700; color:var(--ink); box-shadow:2px 2px 0 var(--ink); background:#fff;}
  .chip-black{display:inline-flex; align-items:center; padding:4px 12px; border:2px solid var(--ink);
    border-radius:999px; font-family:'JetBrains Mono',monospace; font-weight:700; color:#000;
    box-shadow:2px 2px 0 var(--ink);}
  .nav-btn{display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:16px; cursor:pointer;
    color:var(--ink-soft); border:2px solid transparent; transition:all .15s;}
  .nav-btn:hover{background:rgba(255,255,255,.6);}
  .nav-btn.active{font-weight:700; color:var(--ink); border:2px solid var(--ink); box-shadow:var(--shadow-sm); transform:translate(-1px,-1px);}
  ::selection{background:var(--yellow); color:var(--ink);}
  ::-webkit-scrollbar{width:10px; height:10px}
  ::-webkit-scrollbar-thumb{background:var(--ink); border:2px solid var(--cream); border-radius:999px}
  details>summary{list-style:none; cursor:pointer}
  details>summary::-webkit-details-marker{display:none}
  .dot::before{content:""; display:inline-block; width:6px; height:6px; border-radius:999px; background:var(--ink); margin-right:6px}
  .hidden-scrollbar::-webkit-scrollbar{display:none}
  /* Sidebar mobile */
  @media(max-width:900px){
    aside.sidebar{position:fixed; left:-100%; top:0; height:100vh; width:260px; z-index:40; transition:left .25s;}
    aside.sidebar.open{left:0;}
    .menu-toggle{display:inline-flex !important;}
    main{padding:16px !important;}
  }
  .menu-toggle{display:none}
  textarea.nb-input{min-height:160px; resize:vertical}
  @keyframes pulse {
    0%,100% { transform: scale(1); box-shadow: 3px 3px 0 var(--ink); }
    50%     { transform: scale(1.05); box-shadow: 5px 5px 0 var(--ink); }
  }
  .planner-grid{display:grid; gap:12px}
  .planner-grid-week,.planner-grid-month{grid-template-columns:repeat(7,minmax(0,1fr))}
  .planner-day{min-height:130px; background:#fffdf3; border:2px solid var(--ink); border-radius:14px; padding:10px}
  .planner-day-title{color:var(--ink-soft); font-size:.76rem; font-weight:800; text-transform:uppercase; margin-bottom:8px}
  .planner-task{display:flex; align-items:center; justify-content:space-between; gap:10px; background:#fff; border:2px solid var(--ink); border-left:8px solid var(--yellow); border-radius:12px; padding:9px 10px; margin-bottom:8px}
  .planner-task-done{opacity:.6; text-decoration:line-through}
  @media(max-width:900px){.planner-grid-week,.planner-grid-month{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="min-h-screen flex">
  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar w-64 shrink-0 sticky top-0 h-screen p-5 flex flex-col" style="border-right:2px solid var(--ink); background:#FFF7E3">
    <div class="mb-8 px-1 flex items-center gap-2">
      <span class="inline-flex items-center justify-center h-10 w-10 rounded-2xl text-xl"
        style="background:#FFD600; border:2px solid var(--ink); box-shadow:3px 3px 0 var(--ink); font-weight:800;">S</span>
      <div>
        <h1 class="h-display text-2xl font-extrabold leading-none">Studi<span style="color:#FF6B6B">.</span></h1>
        <p class="text-xs mt-1" style="color:var(--ink-soft)">your playful study buddy</p>
      </div>
    </div>
    <nav id="nav" class="flex flex-col gap-1.5"></nav>
    <div class="mt-auto px-2 text-[10px] uppercase tracking-widest" style="color:var(--muted)">focus · log · grow</div>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-6 md:p-10 max-w-6xl mx-auto w-full">
    <button class="menu-toggle nb-btn px-3 py-1.5 mb-3" onclick="document.getElementById('sidebar').classList.toggle('open')">☰ Menu</button>
    <div id="view"></div>
  </main>
</div>

<!-- Modal root -->
<div id="modal-root"></div>

<!-- PWA install FAB (Android/Desktop) -->
<button id="install-fab" style="display:none; position:fixed; bottom:20px; right:20px; z-index:30; background:#FFD600;" class="nb-btn px-4 py-3 inline-flex items-center gap-2">⬇ Install Studi</button>

<!-- iOS install hint (shows once for iPhone/iPad Safari) -->
<div id="ios-hint" style="display:none; position:fixed; left:16px; right:16px; bottom:16px; z-index:30; padding:14px 16px; background:#FFFFFF;" class="nb-card flex items-start gap-3">
  <span style="font-size:24px">📲</span>
  <div class="flex-1 text-sm">
    <div class="h-display font-extrabold mb-0.5">Install Studi on your home screen</div>
    <div style="color:var(--ink-soft)">Tap the <b>Share</b> button in Safari, then <b>"Add to Home Screen"</b>.</div>
  </div>
  <button id="ios-hint-close" class="nb-btn px-2 py-1 text-xs" style="background:#fff">✕</button>
</div>

<script>
/* =================== Storage =================== */
const KEY = "studi.v1";
const defaults = {
  subjects: [],
  tasks: [],
  sessions: [],
  journal: [],
  mocks: [],
  settings: { daily_goal_minutes: 240, pomodoro_work: 25, pomodoro_break: 5 },
  alarms: [],
  music: null, // {name, dataUrl}
};
function load() {
  try {
    const raw = JSON.parse(localStorage.getItem(KEY) || "null");
    if (!raw) return structuredClone(defaults);
    return { ...structuredClone(defaults), ...raw,
      settings: { ...defaults.settings, ...(raw.settings||{}) } };
  } catch { return structuredClone(defaults); }
}
function save() { localStorage.setItem(KEY, JSON.stringify(state)); }
let state = load();

/* =================== Helpers =================== */
const uid = () => (crypto?.randomUUID?.() || Math.random().toString(36).slice(2)+Date.now());
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtMins = (m) => {
  if (!m && m!==0) return "0 min";
  const h=Math.floor(m/60), r=m%60;
  if (h && r) return `${h} hr ${r} min`;
  if (h) return `${h} hr`;
  return `${r} min`;
};
const escapeHtml = (s) => (s||"").toString()
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
const ACCENTS = ["#FFD600","#00C896","#5BC0EB","#B388FF","#FF6B6B","#FFB38A","#FF8AD8","#7CFFCB","#8AB4FF","#F97316","#A3E635","#F43F5E"];
const addDays = (date, count) => { const copy = new Date(date); copy.setDate(copy.getDate()+count); return copy; };
const dateKey = (date) => `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
const parseDateKey = (value) => { const [y,m,d] = value.split("-").map(Number); return new Date(y,m-1,d); };
const startOfWeek = (date) => { const copy = new Date(date); const day = copy.getDay() || 7; copy.setDate(copy.getDate()-day+1); copy.setHours(0,0,0,0); return copy; };
const monthGridDays = (selectedDate) => {
  const first = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), 1);
  const start = startOfWeek(first);
  return Array.from({length:42}, (_,i)=>addDays(start,i));
};
const MOODS = [
  { id:"great", emoji:"🤩", label:"great", color:"#00C896" },
  { id:"good",  emoji:"😊", label:"good",  color:"#FFD600" },
  { id:"okay",  emoji:"🙂", label:"okay",  color:"#FFB38A" },
  { id:"meh",   emoji:"😐", label:"meh",   color:"#B388FF" },
  { id:"bad",   emoji:"😩", label:"bad",   color:"#FF6B6B" },
];

/* =================== Stats helpers =================== */
function todayStats() {
  const t = todayStr();
  const sess = state.sessions.filter(s=>s.date===t);
  const total = sess.reduce((a,b)=>a+b.duration_minutes,0);
  const by = {};
  sess.forEach(s=>{ by[s.subject_name]=(by[s.subject_name]||0)+s.duration_minutes; });
  return { total_minutes:total, by_subject:by, sessions_count:sess.length, goal_minutes: state.settings.daily_goal_minutes };
}
function weeklyStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for (let i=6;i>=0;i--) {
    const d = new Date(today); d.setDate(today.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    const mins = state.sessions.filter(s=>s.date===ds).reduce((a,b)=>a+b.duration_minutes,0);
    days.push({ date:ds, label:d.toLocaleDateString(undefined,{weekday:"short"}), minutes:mins });
  }
  return days;
}
function subjectWeeklyStats() {
  const days = weeklyStats().map(d=>d.date);
  const totals = {};
  state.sessions.filter(s=>days.includes(s.date)).forEach(s=>{
    totals[s.subject_name] = (totals[s.subject_name]||0) + s.duration_minutes;
  });
  return Object.entries(totals).map(([name, minutes])=>{
    const subject = state.subjects.find(s=>s.name===name);
    return { name, minutes, color: subject?.color || ACCENTS[0] };
  }).sort((a,b)=>b.minutes-a.minutes);
}
function streakStats() {
  const set = new Set(state.sessions.map(s=>s.date));
  let cur = new Date(); cur.setHours(0,0,0,0);
  if (!set.has(cur.toISOString().slice(0,10))) cur.setDate(cur.getDate()-1);
  let streak = 0;
  while (set.has(cur.toISOString().slice(0,10))) { streak++; cur.setDate(cur.getDate()-1); }
  let longest=0;
  if (set.size) {
    const sorted = [...set].sort();
    let c=1; longest=1;
    for (let i=1;i<sorted.length;i++){
      const a=new Date(sorted[i-1]), b=new Date(sorted[i]);
      if ((b-a)/86400000===1){c++; longest=Math.max(longest,c);} else c=1;
    }
  }
  return { current:streak, longest, active_days:set.size };
}
function mockStats() {
  const items = state.mocks;
  if (!items.length) return { count:0, avg:0, best:0, worst:0, trend:[] };
  const pcts = items.map(m=>m.percentage);
  const sorted = [...items].sort((a,b)=>a.date.localeCompare(b.date));
  return {
    count: items.length,
    avg: +(pcts.reduce((a,b)=>a+b,0)/pcts.length).toFixed(2),
    best: Math.max(...pcts),
    worst: Math.min(...pcts),
    trend: sorted.map(m=>({ date:m.date, name:m.name, percentage:m.percentage }))
  };
}

/* =================== Router =================== */
const VIEWS = [
  { id:"today",     label:"Today",      icon:"🏠", color:"#FFD600" },
  { id:"subjects",  label:"Subjects",   icon:"📚", color:"#5BC0EB" },
  { id:"pomodoro",  label:"Pomodoro",   icon:"⏱️", color:"#FF6B6B" },
  { id:"schedule",  label:"Schedule",   icon:"⏰", color:"#B388FF" },
  { id:"journal",   label:"Journal",    icon:"📓", color:"#FFB38A" },
  { id:"mocks",     label:"Mock Tests", icon:"📝", color:"#00C896" },
  { id:"stats",     label:"Stats",      icon:"📊", color:"#FFD600" },
  { id:"records",   label:"Records",    icon:"🕘", color:"#5BC0EB" },
  { id:"settings",  label:"Settings",   icon:"⚙️", color:"#B388FF" },
];
let active = "today";
function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = VIEWS.map(v=>`
    <button class="nav-btn ${active===v.id?'active':''}" data-id="${v.id}"
      style="${active===v.id?`background:${v.color}`:''}">
      <span>${v.icon}</span><span>${v.label}</span>
    </button>`).join("");
  nav.querySelectorAll("button").forEach(b=>b.onclick=()=>{ active=b.dataset.id; render(); document.getElementById('sidebar').classList.remove('open'); });
}
function render(){ renderNav(); const el = document.getElementById("view");
  el.innerHTML = ""; (VIEW_FNS[active] || (()=>"") )(el);
  // Re-init any charts in this view
  setTimeout(initCharts, 0);
}

/* =================== Reusable bits =================== */
function chipBlack(mins, color="#FFD600", rotate=0){
  return `<span class="chip-black" style="background:${color}; transform:rotate(${rotate}deg);">${escapeHtml(fmtMins(mins))}</span>`;
}
function pageTitle(title, accent){
  return `<h2 class="h-display text-5xl font-extrabold mb-2">${title}<span style="color:${accent}">.</span></h2>`;
}

/* =================== TODAY VIEW =================== */
const VIEW_FNS = {};
VIEW_FNS.today = (el) => {
  const ts = todayStats(), st = streakStats(), goal = state.settings.daily_goal_minutes;
  const pct = Math.min(100, Math.round((ts.total_minutes/goal)*100));
  el.innerHTML = `
    <div class="space-y-6">
      <div class="flex items-baseline justify-between flex-wrap gap-3">
        <div>
          ${pageTitle("Today", "#FF6B6B")}
          <p style="color:var(--ink-soft)">${new Date().toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"})}</p>
        </div>
        <button id="share-btn" class="nb-btn px-4 py-2 inline-flex items-center gap-2" style="background:#B388FF">🔗 Share my streak</button>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-5">
        <div class="lg:col-span-2 nb-card p-6">
          <div class="flex items-center justify-between mb-4">
            <div class="text-sm font-bold uppercase tracking-widest" style="color:var(--ink-soft)">🎯 Daily Goal</div>
            ${chipBlack(goal,"#5BC0EB",2)}
          </div>
          <div class="flex items-end gap-4 mb-4">
            <div class="h-display text-7xl font-extrabold leading-none">${pct}%</div>
            <div class="pb-2">
              ${chipBlack(ts.total_minutes,"#FFD600",-2)}
              <div class="text-xs mt-2 font-bold uppercase tracking-widest" style="color:var(--ink-soft)">studied today</div>
            </div>
          </div>
          <div style="height:14px; width:100%; border:2px solid var(--ink); border-radius:999px; overflow:hidden; background:#FFEFC2">
            <div style="height:100%; width:${pct}%; background:linear-gradient(90deg,#FFD600,#00C896); transition:width .5s;"></div>
          </div>
        </div>

        <div class="nb-card p-6 flex flex-col justify-between" style="background:#FF6B6B">
          <div class="text-sm font-bold uppercase tracking-widest">🔥 Streak</div>
          <div>
            <div class="h-display text-7xl font-extrabold">${st.current}<span class="text-2xl" style="opacity:.7"> days</span></div>
            <div class="mt-3 flex gap-2 flex-wrap">
              <span class="sticker text-xs" style="background:#FFD600">longest ${st.longest}d</span>
              <span class="sticker text-xs" style="background:#fff">active ${st.active_days}d</span>
            </div>
          </div>
        </div>
      </div>

      <form id="log-form" class="nb-card p-6">
        <h3 class="h-display text-2xl font-extrabold mb-4">Log a study session ✏️</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
          <select id="log-subj" class="nb-input">
            ${state.subjects.length===0?'<option value="">No subjects — add one first</option>':''}
            ${state.subjects.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join("")}
          </select>
          <input id="log-dur" type="number" min="1" value="25" class="nb-input" placeholder="Minutes" />
          <input id="log-notes" type="text" class="nb-input" placeholder="Notes (optional)" />
          <button type="submit" class="nb-btn px-4 py-2.5" style="background:#FFD600" ${state.subjects.length===0?'disabled':''}>Log Session</button>
        </div>
      </form>

      ${Object.keys(ts.by_subject).length>0 ? `
      <div class="nb-card p-6">
        <h3 class="h-display text-xl font-extrabold mb-4">Today by subject</h3>
        <div class="flex flex-wrap gap-3">
          ${Object.entries(ts.by_subject).map(([n,m],i)=>`
            <div class="flex items-center gap-2 nb-card-soft px-3 py-1.5">
              <span class="text-sm font-bold">${escapeHtml(n)}</span>
              ${chipBlack(m, ACCENTS[i%ACCENTS.length])}
            </div>`).join("")}
        </div>
      </div>` : ""}
    </div>
  `;

  document.getElementById("share-btn").onclick = openShareModal;
  document.getElementById("log-form").addEventListener("submit",(e)=>{
    e.preventDefault();
    const sid = document.getElementById("log-subj").value;
    const dur = +document.getElementById("log-dur").value;
    const notes = document.getElementById("log-notes").value;
    if (!sid || !dur) return;
    const subj = state.subjects.find(s=>s.id===sid);
    state.sessions.push({ id:uid(), subject_id:sid, subject_name:subj.name, duration_minutes:dur, notes, date:todayStr(), started_at:new Date().toISOString() });
    save(); render();
  });
};

/* =================== SHARE STREAK MODAL =================== */
function openShareModal(){
  const st = streakStats(), ts = todayStats(), w = weeklyStats();
  const totalWeek = w.reduce((a,b)=>a+b.minutes,0);
  const maxMin = Math.max(1, ...w.map(d=>d.minutes));
  const root = document.getElementById("modal-root");
  root.innerHTML = `
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(26,26,46,0.6); backdrop-filter:blur(4px)">
    <div class="max-w-lg w-full">
      <div class="flex items-center justify-between mb-3">
        <div class="h-display font-bold text-white text-lg">Share my streak ✨</div>
        <button id="close-share" class="nb-btn px-3 py-1.5 text-sm">Close</button>
      </div>
      <div id="share-card" style="background:linear-gradient(135deg,#FFD600 0%,#FFB38A 50%,#FF6B6B 100%); border:3px solid #1a1a2e; box-shadow:8px 8px 0 #1a1a2e; border-radius:24px; padding:28px; position:relative; overflow:hidden;">
        <div style="position:absolute; top:-24px; right:-24px; height:128px; width:128px; border-radius:999px; background:#5BC0EB; border:3px solid #1a1a2e;"></div>
        <div style="position:absolute; bottom:-32px; left:-16px; height:96px; width:96px; border-radius:999px; background:#B388FF; border:3px solid #1a1a2e;"></div>
        <div style="position:relative">
          <div class="text-xs uppercase tracking-widest font-bold">✨ studi · streak</div>
          <div class="mt-4 flex items-end gap-3">
            <div class="h-display" style="font-size:96px; font-weight:800; line-height:1;">${st.current}</div>

let pomodoro = {
  isRunning: false,
  mode: "work",
  workDuration: 25 * 60,
  breakDuration: 5 * 60,
  timeLeft: 25 * 60,
  interval: null,
  currentSubject: null
};
function syncPomodoroSettings(){
  pomodoro.workDuration = Math.max(1, state.settings.pomodoro_work || 25) * 60;
  pomodoro.breakDuration = Math.max(1, state.settings.pomodoro_break || 5) * 60;
  if (!pomodoro.timeLeft) pomodoro.timeLeft = pomodoro.workDuration;
}
function pomoTotals(){ syncPomodoroSettings(); return { work: pomodoro.workDuration, brk: pomodoro.breakDuration }; }
function pomoBeep(){
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.frequency.value=880; g.gain.setValueAtTime(0.3,ctx.currentTime);
    o.start(); o.stop(ctx.currentTime+0.6);
  } catch(e){}
}

function pomoStop(){ if (pomodoro.interval){clearInterval(pomodoro.interval); pomodoro.interval=null;} pomodoro.isRunning=false; }
function pomoStart(){
  syncPomodoroSettings();
  pomodoro.isRunning = true;
  pomodoro.interval = setInterval(()=>{
    pomodoro.timeLeft -= 1;
    // partial DOM update for smoothness
    if (active==="pomodoro"){
      const m=Math.floor(pomodoro.timeLeft/60), s= pomodoro.timeLeft%60;
      const node = document.querySelector(".mono");
      if (node) node.textContent = `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }
    if (pomodoro.timeLeft<=0){
      pomoStop(); pomoBeep();
      const t = pomoTotals();
      if (pomodoro.mode==="work" && pomodoro.currentSubject){
        const subj = state.subjects.find(x=>x.id===pomodoro.currentSubject);
        if (subj){
          state.sessions.push({ id:uid(), subject_id:subj.id, subject_name:subj.name,
            duration_minutes: state.settings.pomodoro_work, notes:"Pomodoro session",
            date:todayStr(), started_at:new Date().toISOString() });
          save();
        }
      }
      pomodoro.mode = pomodoro.mode==="work" ? "break" : "work";
      pomodoro.timeLeft = pomodoro.mode==="work" ? t.work : t.brk;
      if (active==="pomodoro") render();
    }
  }, 1000);
}

/* =================== SCHEDULE =================== */
/* =================== SCHEDULE & ALARMS =================== */
let alarmsTriggered = new Set(); // dayKey-id-kind
let lastTickMinute = "";          // "HH:MM" of previous tick — used to catch up across throttled gaps
let audioUnlocked = false;        // true once user gesture has primed audio
let sharedAudioCtx = null;        // reused AudioContext (must be created on user gesture)
let activeBeepTimers = [];        // running default-beep timeouts (so we can stop)
let activeMusicEl = null;         // running uploaded-music <audio> (so we can stop)
let audioPlaying = false;         // true while alarm sound (music or beeps) is currently audible
let editingAlarmId = null;        // UI: id of alarm currently in edit mode

function curMinute(d=new Date()){
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function dayKey(d=new Date()){ return d.toISOString().slice(0,10); }

// Returns true if `t` (HH:MM) falls strictly after `from` and on/before `to` within the same day.
function timeInWindow(t, from, to){
  if (!t || !from || !to) return false;
  if (from === to) return t === to;
  if (from < to) return t > from && t <= to;
  // wrap past midnight (e.g., 23:59 → 00:00)
  return t > from || t <= to;
}

// Try to unlock audio playback on first user interaction (required by browser autoplay policies)
function unlockAudio(){
  if (audioUnlocked) return;
  try {
    sharedAudioCtx = sharedAudioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if (sharedAudioCtx.state === "suspended") sharedAudioCtx.resume();
    // play a 1-frame silent buffer to "prime" iOS Safari
    const buf = sharedAudioCtx.createBuffer(1, 1, 22050);
    const src = sharedAudioCtx.createBufferSource();
    src.buffer = buf; src.connect(sharedAudioCtx.destination); src.start(0);
    audioUnlocked = true;
    updateSoundBadge();
  } catch(e){ console.warn("audio unlock failed", e); }
}
["click","touchstart","keydown","pointerdown"].forEach(ev=>{
  window.addEventListener(ev, unlockAudio, { once:false, passive:true });
});

function updateSoundBadge(){
  const el = document.getElementById("sound-status");
  if (!el) return;
  if (audioUnlocked){
    el.style.background = "#00C896"; el.textContent = "🔊 Sound ready";
  } else {
    el.style.background = "#FF6B6B"; el.textContent = "⚠ Tap anywhere to enable sound";
  }
}

function stopAlarm(){
  activeBeepTimers.forEach(id=>clearTimeout(id));
  activeBeepTimers = [];
  if (activeMusicEl){ try { activeMusicEl.pause(); activeMusicEl.currentTime = 0; } catch(e){} activeMusicEl = null; }
  audioPlaying = false;
  updateStopFab();
  if (titleFlashTimer) { clearInterval(titleFlashTimer); titleFlashTimer = null; document.title = "Studi · Daily Study Tracker"; }
}

function updateStopFab(){
  let fab = document.getElementById("stop-alarm-fab");
  if (audioPlaying){
    if (!fab) {
      fab = document.createElement("button");
      fab.id = "stop-alarm-fab";
      fab.className = "nb-btn";
      fab.style.cssText = "position:fixed; bottom:90px; right:20px; z-index:35; padding:14px 20px; background:#FF6B6B; font-weight:800; font-size:16px; animation:pulse 1.2s ease-in-out infinite;";
      fab.innerHTML = "🔇 Stop alarm";
      fab.onclick = ()=>{ stopAlarm(); };
      document.body.appendChild(fab);
    }
  } else {
    if (fab) fab.remove();
  }
}

function playAlarm(soundUrl){
  stopAlarm();
  audioPlaying = true;
  updateStopFab();
  const url = soundUrl || state.music?.dataUrl;
  // 1) If a sound URL is supplied (per-alarm or global), play it ONCE
  if (url){
    try {
      const a = new Audio(url);
      a.loop = false; a.volume = 1;
      activeMusicEl = a;
      a.onended = ()=>{ audioPlaying = false; activeMusicEl = null; updateStopFab(); };
      const p = a.play();
      if (p && p.catch) p.catch(err => {
        console.warn("music play blocked", err);
        defaultBeepLoop(); // fallback to beeps
      });
      // safety auto-stop after 60s
      activeBeepTimers.push(setTimeout(()=>{ stopAlarm(); }, 60000));
      return;
    } catch(e){ console.warn(e); }
  }
  defaultBeepLoop();
}

function defaultBeepLoop(){
  try {
    sharedAudioCtx = sharedAudioCtx || new (window.AudioContext||window.webkitAudioContext)();
    if (sharedAudioCtx.state === "suspended") sharedAudioCtx.resume();
    const ctx = sharedAudioCtx;
    // 8 attention-grabbing beeps over ~6s, alternating frequency
    const PATTERN = 8, GAP = 0.7;
    for (let i = 0; i < PATTERN; i++){
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = i % 2 ? "square" : "sine";
      o.frequency.value = i % 2 ? 660 : 990;
      o.connect(g); g.connect(ctx.destination);
      const t0 = ctx.currentTime + i * GAP;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.4, t0 + 0.02);
      g.gain.linearRampToValueAtTime(0, t0 + 0.4);
      o.start(t0); o.stop(t0 + 0.45);
    }
    // mark playing & schedule auto-clear at end of pattern
    audioPlaying = true;
    updateStopFab();
    activeBeepTimers.push(setTimeout(()=>{ audioPlaying = false; updateStopFab(); }, (PATTERN * GAP * 1000) + 200));
  } catch(e){ console.warn("beep failed", e); audioPlaying = false; updateStopFab(); }
}

function showAlarmToast(msg, opts){
  const root = document.getElementById("modal-root");
  const id = "toast-" + Date.now();
  const el = document.createElement("div");
  el.id = id;
  el.className = "nb-card";
  el.style.cssText = "position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:60; padding:14px 20px; background:#FFD600; display:flex; align-items:center; gap:14px; max-width:90vw; flex-wrap:wrap;";
  const showCheckin = !!(opts && opts.checkin);
  const showSnooze = !!(opts && opts.alarm);
  const hint = [
    showCheckin ? '"Start studying"' : null,
    showSnooze ? '"Snooze 5 min"' : null,
    'Stop'
  ].filter(Boolean).join(" · ");
  el.innerHTML = `<span style="font-size:28px">⏰</span>
    <div class="flex-1" style="min-width:200px">
      <div class="h-display font-extrabold text-lg">${escapeHtml(msg)}</div>
      <div class="text-xs" style="color:var(--ink-soft)">Tap ${hint}</div>
    </div>
    ${showCheckin?'<button class="nb-btn px-3 py-2 text-xs" data-act="checkin" style="background:#00C896">▶ Start studying</button>':''}
    ${showSnooze?'<button class="nb-btn px-3 py-2 text-xs" data-act="snooze" style="background:#B388FF">💤 Snooze 5</button>':''}
    <button class="nb-btn px-3 py-1 text-xs" data-act="stop" style="background:#fff">Stop</button>`;
  root.appendChild(el);
  const dismiss = ()=>{ stopAlarm(); el.remove(); };
  el.addEventListener("click", (ev)=>{
    const act = ev.target?.closest("[data-act]")?.dataset?.act;
    if (act === "stop") { ev.stopPropagation(); dismiss(); return; }
    if (act === "checkin"){
      ev.stopPropagation();
      dismiss();
      startStudyCheckin(opts.alarm);
      return;
    }
    if (act === "snooze"){
      ev.stopPropagation();
      stopAlarm();
      el.remove();
      snoozeAlarm(opts.alarm, opts.kind || "start", 5);
      return;
    }
    if (!showCheckin && !showSnooze) dismiss();
  });
  setTimeout(()=>{ if (document.getElementById(id)) document.getElementById(id).remove(); }, 25000);
  flashTitle("⏰ " + msg);
  if (navigator.vibrate) try { navigator.vibrate([300,150,300,150,300]); } catch(e){}
}

let snoozeTimers = [];
function snoozeAlarm(alarm, kind, minutes){
  if (!alarm) return;
  showSnoozeToast(`💤 Snoozed "${alarm.label || 'Study block'}" for ${minutes} min`);
  const handle = setTimeout(()=>{
    snoozeTimers = snoozeTimers.filter(h=>h!==handle);
    // Re-fire
    const perAlarmSound = kind === "start" ? alarm.startMusicData : alarm.endMusicData;
    playAlarm(perAlarmSound || null);
    const verb = kind === "start" ? "starting" : "ended";
    const symbol = kind === "start" ? "▶" : "⏹";
    showAlarmToast(`${symbol} ${alarm.label || "Study block"} ${verb} (snoozed)`, { alarm, kind, checkin: kind === "start" });
    if ("Notification" in window && Notification.permission === "granted"){
      try { new Notification("Studi", { body:`${symbol} ${alarm.label || "Study block"} ${verb} (snoozed)` }); } catch(e){}
    }
  }, minutes * 60 * 1000);
  snoozeTimers.push(handle);
}

function showSnoozeToast(msg){
  const root = document.getElementById("modal-root");

}

// Study check-in: log a 1-min "started" session for the alarm's subject (or first subject) and auto-start the Pomodoro
function startStudyCheckin(alarm){
  let subj = null;
  if (alarm && alarm.subjectId) subj = state.subjects.find(s=>s.id===alarm.subjectId) || null;
  if (!subj) subj = state.subjects[0] || null;
  if (!subj){
    showAlarmToast("Add a subject first to use check-in");
    active = "subjects"; render();
    return;
  }
  state.sessions.push({
    id: uid(), subject_id: subj.id, subject_name: subj.name,
    duration_minutes: 1, notes: `✏️ Started via alarm: ${alarm?.label || "Study block"}`,
    date: todayStr(), started_at: new Date().toISOString()
  });
  save();
  // Configure & start Pomodoro for this subject
  const t = pomoTotals();
  pomoStop();
  pomodoro.mode = "work";
  pomodoro.currentSubject = subj.id;
  pomodoro.timeLeft = t.work;

}

let titleFlashTimer = null;
function flashTitle(msg){
  const orig = "Studi · Daily Study Tracker";
  if (titleFlashTimer) { clearInterval(titleFlashTimer); document.title = orig; }
  let on = true; let count = 0;
  titleFlashTimer = setInterval(()=>{
    document.title = on ? msg : orig;
    on = !on; count++;
    if (count > 14) { clearInterval(titleFlashTimer); titleFlashTimer = null; document.title = orig; }
  }, 700);
}

function fireAlarm(alarm, kind){
  const k = `${dayKey()}-${alarm.id}-${kind}`;
  if (alarmsTriggered.has(k)) return;
  alarmsTriggered.add(k);
  // Per-alarm sound takes precedence over global music; falls back to default beep
  const perAlarmSound = kind === "start" ? alarm.startMusicData : alarm.endMusicData;
  playAlarm(perAlarmSound || null);
  const verb = kind === "start" ? "starting" : "ended";
  const symbol = kind === "start" ? "▶" : "⏹";
  showAlarmToast(`${symbol} ${alarm.label || "Study block"} ${verb}`, { alarm, kind, checkin: kind === "start" });
  if ("Notification" in window && Notification.permission === "granted"){
    try { new Notification("Studi", { body:`${symbol} ${alarm.label || "Study block"} ${verb}`, icon:"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23FFD600'/><text x='32' y='44' text-anchor='middle' font-size='38' font-family='sans-serif' font-weight='800' fill='%231a1a2e'>S</text></svg>" }); } catch(e){}
  }
}

function alarmsTick(){
  const now = new Date();
  const cur = curMinute(now);
  if (cur === lastTickMinute) return;       // only act on minute change
  const prev = lastTickMinute || cur;        // first tick: check exact only
  lastTickMinute = cur;

  state.alarms.forEach(a=>{
    [["start",a.startTime],["end",a.endTime]].forEach(([kind,time])=>{
      if (!time) return;
      // First-tick of session: exact match only
      // Subsequent ticks: trigger if alarm time is in (prev, cur] window — handles throttled / suspended tabs
      const hit = (prev === cur) ? (time === cur) : timeInWindow(time, prev, cur);
      if (hit) fireAlarm(a, kind);
    });
  });
}

// Reset day-bucket when day changes (so alarms fire again next day)
function pruneTriggered(){
  const today = dayKey();
  alarmsTriggered = new Set([...alarmsTriggered].filter(k=>k.startsWith(today)));
}
setInterval(pruneTriggered, 60_000);

// Catch up when tab becomes visible after being throttled
document.addEventListener("visibilitychange", ()=>{
  if (!document.hidden) alarmsTick();
});

    const c = document.getElementById("big-clock");

}, 1000);

function renderPlannerMarkup(){
  const plannerView = state._plannerView || "daily";
  const selectedDate = state._plannerDate || todayStr();
  const selected = parseDateKey(selectedDate);
  const subjectOptions = state.subjects.length
    ? state.subjects.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join("")
    : '<option value="">No subjects yet</option>';
  const subjectFor = (id) => state.subjects.find(s=>s.id===id) || { name:"General", color:"#FFD600" };
  const tasksForDate = (day) => (state.tasks || []).filter(t=>t.date===day);
  const taskHtml = (task, compact=false) => {
    const subject = subjectFor(task.subjectId);
    return `<div class="planner-task ${task.done?'planner-task-done':''}" style="border-left-color:${subject.color}">
      <div class="min-w-0">
        <div class="font-bold truncate">${escapeHtml(task.title)}</div>
        ${compact ? "" : `<div class="text-xs mt-1" style="color:var(--ink-soft)">${escapeHtml(subject.name)} - ${task.date}</div>`}
      </div>
      ${compact ? "" : `<div class="flex gap-2"><button class="nb-btn px-3 py-1 text-xs" style="background:#00C896" data-task-done="${task.id}">${task.done?'Undo':'Done'}</button><button class="nb-btn px-3 py-1 text-xs" style="background:#FF6B6B" data-task-delete="${task.id}">Delete</button></div>`}
    </div>`;
  };
  const daily = `<div class="space-y-3">${tasksForDate(selectedDate).length ? tasksForDate(selectedDate).map(t=>taskHtml(t)).join("") : `<div class="text-center py-6" style="color:var(--ink-soft)">No tasks for this date.</div>`}</div>`;
  const weekDays = Array.from({length:7}, (_,i)=>addDays(startOfWeek(selected), i));
  const weekly = `<div class="planner-grid planner-grid-week">${weekDays.map(day=>{
    const key = dateKey(day);
    return `<div class="planner-day"><div class="planner-day-title">${day.toLocaleDateString(undefined,{weekday:"short"})}<br>${day.toLocaleDateString(undefined,{month:"short",day:"numeric"})}</div>${tasksForDate(key).map(t=>taskHtml(t,true)).join("")}</div>`;
  }).join("")}</div>`;
  const monthly = `<div class="planner-grid planner-grid-month">${monthGridDays(selected).map(day=>{
    const key = dateKey(day);
    const outside = day.getMonth() !== selected.getMonth() ? "opacity:.4;" : "";
    return `<div class="planner-day" style="${outside}"><div class="planner-day-title">${day.getDate()}</div>${tasksForDate(key).slice(0,3).map(t=>taskHtml(t,true)).join("")}</div>`;
  }).join("")}</div>`;
  const body = plannerView === "weekly" ? weekly : plannerView === "monthly" ? monthly : daily;
  return `
    <div class="nb-card p-6 mt-6">
      <div class="flex items-center justify-between gap-3 flex-wrap mb-4">
        <h3 class="h-display text-xl font-extrabold">Daily / Weekly / Monthly Planner</h3>
        <div class="flex gap-2">
          ${["daily","weekly","monthly"].map(v=>`<button class="nb-btn px-3 py-1.5 text-xs capitalize" style="background:${plannerView===v?'#FFD600':'#fff'}" data-planner-view="${v}">${v}</button>`).join("")}
        </div>
      </div>
      <form id="planner-form" class="grid grid-cols-1 md:grid-cols-12 gap-3 mb-5">
        <input id="planner-title" class="md:col-span-5 nb-input" placeholder="Task (e.g. Revise algebra)" />
        <input id="planner-date" type="date" value="${selectedDate}" class="md:col-span-2 nb-input" />
        <select id="planner-subject" class="md:col-span-3 nb-input">${subjectOptions}</select>
        <button class="md:col-span-2 nb-btn px-4 py-2" style="background:#B388FF" ${state.subjects.length===0?'disabled':''}>Add task</button>
      </form>
      <div id="planner-body">${body}</div>
    </div>`;
}

function setupPlannerHandlers(){
  document.querySelectorAll("[data-planner-view]").forEach(btn=>btn.onclick=()=>{
    state._plannerView = btn.dataset.plannerView;
    render();
  });
  const dateInput = document.getElementById("planner-date");
  if (dateInput) dateInput.onchange = (e)=>{ state._plannerDate = e.target.value || todayStr(); render(); };
  const form = document.getElementById("planner-form");
  if (form) form.onsubmit = (e)=>{
    e.preventDefault();
    const title = document.getElementById("planner-title").value.trim();
    const subjectId = document.getElementById("planner-subject").value;
    const taskDate = document.getElementById("planner-date").value || todayStr();
    if (!title || !subjectId) return;
    state.tasks = state.tasks || [];
    state.tasks.push({ id:uid(), title, subjectId, date:taskDate, done:false });
    state._plannerDate = taskDate;
    save(); render();
  };
  document.querySelectorAll("[data-task-done]").forEach(btn=>btn.onclick=()=>{
    const task = (state.tasks || []).find(t=>t.id===btn.dataset.taskDone);
    if (task) task.done = !task.done;
    save(); render();
  });
  document.querySelectorAll("[data-task-delete]").forEach(btn=>btn.onclick=()=>{
    state.tasks = (state.tasks || []).filter(t=>t.id!==btn.dataset.taskDelete);
    save(); render();
  });
}

  const renderMoods = ()=> {
    moodsEl.innerHTML = MOODS.map(m=>`
      <button data-m="${m.id}" class="nb-btn px-3 py-1.5 text-sm flex items-center gap-1.5"
        style="background:${mood===m.id?m.color:'#fff'}; opacity:${mood===m.id?1:.7}">
        <span>${m.emoji}</span><span class="font-bold">${m.label}</span>
      </button>`).join("");
    moodsEl.querySelectorAll("button").forEach(b=>b.onclick=()=>{ mood=b.dataset.m; renderMoods(); });
  };
  renderMoods();

  document.getElementById("j-date").onchange = (e)=>{ state._journalDate = e.target.value; render(); };
  document.getElementById("j-save").onclick = ()=>{
    const content = document.getElementById("j-content").value;
    const d = document.getElementById("j-date").value;
    const exist = state.journal.find(x=>x.date===d);
    if (exist){ exist.mood=mood; exist.content=content; exist.updated_at=new Date().toISOString(); }
    else state.journal.push({ id:uid(), date:d, mood, content, created_at:new Date().toISOString(), updated_at:new Date().toISOString() });
    save();
    document.getElementById("j-msg").textContent = "saved at "+new Date().toLocaleTimeString();
    setTimeout(()=>document.getElementById("j-msg") && (document.getElementById("j-msg").textContent=""), 1500);
    renderJournalList();
  };

  function renderJournalList(){
    const list = document.getElementById("j-list");
    const items = [...state.journal].sort((a,b)=>b.date.localeCompare(a.date));
    if (items.length===0){ list.innerHTML = `<div class="md:col-span-2 text-center py-8" style="color:var(--ink-soft)">No journal entries yet. Start with today.</div>`; return; }
    list.innerHTML = items.map(e=>{
      const m = MOODS.find(x=>x.id===e.mood) || MOODS[2];
      return `<div class="nb-card p-4 cursor-pointer" data-d="${e.date}" data-id="${e.id}" style="background:${m.color}33">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <span style="font-size:24px">${m.emoji}</span>
            <span class="mono font-bold">${e.date}</span>
          </div>
          <button class="nb-btn p-1.5" style="background:#FF6B6B" data-del="${e.id}">🗑</button>
        </div>
        <p class="text-sm" style="white-space:pre-wrap; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;">${escapeHtml(e.content)||'<em style="color:var(--ink-soft)">empty</em>'}</p>
      </div>`;
    }).join("");
    list.querySelectorAll("[data-del]").forEach(b=>b.onclick=(ev)=>{
      ev.stopPropagation();
      if (!confirm("Delete this journal entry?")) return;
      state.journal = state.journal.filter(x=>x.id!==b.dataset.del); save(); renderJournalList();
    });
    list.querySelectorAll("[data-d]").forEach(d=>d.onclick=()=>{ state._journalDate=d.dataset.d; render(); });
  }
  renderJournalList();
};

function download(filename, blob){
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

(function setupPWA(){
  // Inline web manifest via Blob URL — keeps everything in one file
  const manifest = {
    name: "Studi · Daily Study Tracker",
    short_name: "Studi",
    description: "A playful daily study tracker — subjects, pomodoro, schedule, journal, mock tests. Saves to your browser.",
    start_url: "./",
    scope: "./",
    display: "standalone",
    orientation: "portrait-primary",
    background_color: "#FFF7E3",
    theme_color: "#FFD600",
    categories: ["productivity","education","lifestyle"],
    icons: [
      { src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%23FFD600'/><rect x='40' y='40' width='432' height='432' rx='80' fill='%23FFD600' stroke='%231a1a2e' stroke-width='20'/><text x='256' y='360' text-anchor='middle' font-family='Arial Black,sans-serif' font-size='320' font-weight='900' fill='%231a1a2e'>S</text></svg>",
        sizes: "192x192 512x512 any", type: "image/svg+xml", purpose: "any maskable" }
    ]
  };
  try {
    const blob = new Blob([JSON.stringify(manifest)], { type: "application/manifest+json" });
    const url = URL.createObjectURL(blob);
    const lnk = document.createElement("link");
    lnk.rel = "manifest"; lnk.href = url;
    document.head.appendChild(lnk);
  } catch(e) { console.warn("manifest inject failed", e); }

  // Android/Desktop install prompt
  let deferred = null;
  const fab = document.getElementById("install-fab");
  window.addEventListener("beforeinstallprompt", (e)=>{
    e.preventDefault(); deferred = e;
    if (fab) fab.style.display = "inline-flex";
  });
  if (fab) fab.onclick = async ()=>{
    if (!deferred) return;
    deferred.prompt();
    try { await deferred.userChoice; } catch(e){}
    deferred = null; fab.style.display = "none";
  };
  window.addEventListener("appinstalled", ()=>{ if (fab) fab.style.display="none"; deferred=null; });

  // iOS Safari one-time hint
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  const HINT_KEY = "studi.iosHintDismissed";
  if (isIOS && !isStandalone && !localStorage.getItem(HINT_KEY)) {
    const hint = document.getElementById("ios-hint");
    if (hint) {
      setTimeout(()=>{ hint.style.display = "flex"; }, 1500);
      document.getElementById("ios-hint-close").onclick = ()=>{
        localStorage.setItem(HINT_KEY, "1"); hint.style.display = "none";
      };
    }
  }
})();

/* =================== Boot =================== */
render();
</script>
</body>
</html>
